<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Password Generator</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="favicon.ico" type="image/x-icon">
    </head>
    <body>
        <div class="container">
            <h1>Random Password Generator</h1> 
            <div class="password-controls">
                <label for="length">Password length:</label>
                <input type="number" id="length" min="4" max="20" value="12">

                <div class="checkbox-group">
                    <div>
                        <input type="checkbox" id="uppercase" checked>
                        <label for="uppercase">Include Uppercase</label>
                    </div>
                    <div>
                        <input type="checkbox" id="lowercase" checked>
                        <label for="lowercase">Include Lowercase</label>
                    </div>
                    <div>
                        <input type="checkbox" id="numbers" checked>
                        <label for="numbers">Include Numbers</label>
                    </div>
                    <div>
                        <input type="checkbox" id="symbols" checked>
                        <label for="symbols">Include Symbols</label>
                    </div>
                </div>
                <button id="generate" class="btn-gen">Generate Your Password</button>
            </div>
            <div class="password-output">
                <label for="password">Generated Password:</label>
                <input type="text" id="password" class="input-password" placeholder="Password will appear here" readonly aria-live="polite">
            </div>
        </div>
        <script src="script.js"></script>
    </body>
    <footer>
        <div class="footer-container">
        <h3>Developed by Jai using basic html,css and Javascript, PWA currently under development.</h3>
        </div>
    </footer>
</html>
